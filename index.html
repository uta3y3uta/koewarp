<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>コエワープ</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23e3350d'/%3E%3Crect x='4' y='46' width='92' height='8' fill='%23222'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23fff' stroke='%23222' stroke-width='6'/%3E%3C/svg%3E" />
</head>
<body>

<!-- ========== 設定画面 ========== -->
<main id="settings" class="screen">
  <header class="app-head">
    <span class="logo-ball"></span>
    <span class="logo-text">コエワープ</span>
  </header>

  <div class="studio">
    <!-- 左：記録先URL・共有発行・各種セレクタ -->
    <section class="controls">
      <!-- 記録先URL -->
      <div class="url-field" id="driveCard">
        <span class="url-ic">📥</span>
        <input type="url" id="driveUrl" inputmode="url" autocomplete="off"
          placeholder="記録先URLを貼り付け" />
        <button class="help-btn" id="setupToggle" type="button" aria-label="使い方">?</button>
        <span class="dot" id="driveDot" title="未設定"></span>
      </div>

      <!-- 共有URL発行 -->
      <button class="publish-btn" id="publishBtn" type="button">🔗 共有URLを発行</button>
      <div class="share-out" id="shareOut" hidden>
        <input type="text" id="shareUrl" readonly />
        <button id="copyBtn" type="button" aria-label="コピー">📋</button>
      </div>
      <p class="share-msg" id="shareMsg"></p>

      <!-- セレクタ群（プルダウン） -->
      <div class="ctl"><span class="ctl-ic">🎨</span><select class="sel" id="themeSel"></select></div>
      <div class="ctl"><span class="ctl-ic">🎙️</span><select class="sel" id="shapeSel"></select></div>
      <div class="ctl"><span class="ctl-ic">🌈</span><select class="sel" id="colorSel"></select></div>
      <div class="ctl"><span class="ctl-ic">📏</span><select class="sel" id="sizeSel"></select></div>
      <div class="ctl"><span class="ctl-ic">✨</span><select class="sel" id="fxSel"></select></div>

      <!-- 使い方（初期は隠す） -->
      <div class="setup-guide" id="setupGuide" hidden>
        <ol>
          <li><a href="https://script.google.com/home" target="_blank" rel="noopener">script.google.com</a> で新規プロジェクト作成</li>
          <li><code>gas/Code.gs</code> を貼り，<code>FOLDER_ID</code> に保存先フォルダIDを入力</li>
          <li>デプロイ →「ウェブアプリ」→ アクセス「全員」で公開</li>
          <li>発行された <code>…/exec</code> のURLを上の欄へ貼り付け</li>
        </ol>
      </div>
    </section>

    <!-- 右：プレビュー -->
    <section class="stage-wrap" id="preview">
      <div class="mic-stage">
        <div class="fx-layer" id="fxLayer"></div>
        <button class="mic-btn shaped" id="previewMic" type="button" aria-label="マイク">
          <svg viewBox="0 0 24 24" class="mic-ic"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/></svg>
        </button>
      </div>
    </section>
  </div>
</main>

<!-- ========== 録音画面（共有リンク先） ========== -->
<main id="recorder" class="screen" hidden>
  <div class="rec-wrap">
    <h1 class="rec-title" id="recTitle">コエワープ</h1>
    <input type="text" id="recName" class="rec-name" placeholder="データ名を入力（例：山田太郎_感想）" />
    <div class="mic-stage rec-stage">
      <div class="fx-layer" id="recFxLayer"></div>
      <button class="mic-btn shaped" id="recMic" type="button" aria-label="録音">
        <svg viewBox="0 0 24 24" class="mic-ic"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/></svg>
      </button>
    </div>
    <div class="rec-status" id="recStatus">マイクを押して録音を開始</div>
    <div class="rec-timer" id="recTimer" hidden>00:00</div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
